html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:var(--transition)}
.glass{background:var(--bg-glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius)}
button{cursor:pointer;font-family:inherit;border:none;outline:none;transition:var(--transition)}
button:active{transform:scale(.96)}
input,textarea,select{font-family:inherit;outline:none;border:none;background:transparent;color:var(--text)}

/* ===== HERO ===== */
.hero{position:relative;width:100%;height:220px;overflow:hidden;transition:var(--transition)}
.hero-bg{position:absolute;inset:0;background:var(--hero-img);background-size:cover;background-position:center;transition:background-image .6s ease;filter:brightness(.55)}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,17,23,.3) 0%,rgba(15,17,23,.95) 100%)}
.hero-content{position:relative;z-index:2;height:100%;display:flex;align-items:flex-end;padding:0 24px 20px;gap:16px}
.hero-logo{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--accent);box-shadow:0 0 20px var(--accent-glow);transition:var(--transition);flex-shrink:0}
.hero-text h1{font-family:'Playfair Display',serif;font-size:1.6rem;line-height:1.2;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.5)}
.hero-text p{font-size:.8rem;color:rgba(255,255,255,.7);margin-top:4px;font-style:italic}

/* ===== RESTAURANT PILLS ===== */
.restaurant-pills{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.restaurant-pills::-webkit-scrollbar{display:none}
.pill{padding:8px 18px;border-radius:40px;font-size:.8rem;font-weight:600;white-space:nowrap;background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);transition:var(--transition)}
.pill.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 0 16px var(--accent-glow)}

/* ===== STATS BAR ===== */
.stats-bar{display:flex;gap:10px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stat-card{flex:0 0 auto;min-width:120px;padding:12px 16px;border-radius:var(--radius);background:var(--bg-glass);backdrop-filter:blur(20px);border:1px solid var(--border)}
.stat-card .stat-value{font-size:1.4rem;font-weight:700;color:var(--accent)}
.stat-card .stat-label{font-size:.7rem;color:var(--text-muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* ===== LAYOUT ===== */
.app-layout{display:flex;flex-direction:column;min-height:calc(100vh - 220px)}
@media(min-width:1024px){
  .hero{height:260px}
  .hero-logo{width:90px;height:90px}
  .hero-text h1{font-size:2.2rem}
  .app-layout{flex-direction:row}
  .calendar-section{flex:1;min-width:0}
  .sidebar{width:320px;border-left:1px solid var(--border);padding:16px;overflow-y:auto;max-height:calc(100vh - 260px);position:sticky;top:0}
}

/* ===== VIEW TABS ===== */
.view-tabs{display:flex;gap:4px;padding:8px 16px;background:var(--bg)}
.view-tab{padding:6px 16px;border-radius:var(--radius-sm);font-size:.75rem;font-weight:600;color:var(--text-muted);background:transparent}
.view-tab.active{background:var(--primary);color:#fff}

/* ===== CALENDAR ===== */
.calendar-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.calendar-header h2{font-size:1rem;font-weight:600}
.calendar-nav{display:flex;gap:6px}
.calendar-nav button{width:32px;height:32px;border-radius:50%;background:var(--bg-glass);color:var(--text);display:flex;align-items:center;justify-content:center;font-size:1rem;border:1px solid var(--border)}
.week-grid{display:grid;grid-template-columns:60px repeat(7,1fr);border-top:1px solid var(--border)}
.week-header{display:contents}
.week-header .day-label{padding:8px 4px;text-align:center;font-size:.65rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;border-bottom:1px solid var(--border)}
.week-header .day-label.today{color:var(--accent)}
.week-header .time-label-header{border-bottom:1px solid var(--border)}
.time-slot{display:contents}
.time-label{padding:4px 8px;font-size:.65rem;color:var(--text-muted);text-align:right;border-right:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:flex-end}
.day-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:52px;padding:2px;position:relative;cursor:pointer;transition:background .2s}
.day-cell:hover{background:rgba(255,255,255,.03)}
.day-cell.today-col{background:rgba(255,255,255,.02)}

/* Reservation cards in cells */
.res-card{border-radius:6px;padding:3px 5px;margin-bottom:2px;font-size:.6rem;line-height:1.3;cursor:pointer;transition:var(--transition);position:relative;overflow:hidden;border-left:3px solid var(--zone-beach)}
.res-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.res-card.zone-beach{border-left-color:var(--zone-beach);background:rgba(0,180,216,.1)}
.res-card.zone-indoor{border-left-color:var(--zone-indoor);background:rgba(231,111,81,.1)}
.res-card.zone-salon{border-left-color:var(--zone-salon);background:rgba(155,93,229,.1)}
.res-card .rc-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.res-card .rc-meta{color:var(--text-muted);display:flex;gap:4px;align-items:center}

/* Day view (mobile) */
.day-view{display:none}
.day-view .dv-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.day-view .dv-header h2{font-size:1rem;font-weight:600}
.dv-slots{padding:0 16px}
.dv-slot{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.dv-slot .dv-time{width:50px;font-size:.75rem;color:var(--text-muted);font-weight:500;flex-shrink:0;padding-top:2px}
.dv-slot .dv-cards{flex:1;display:flex;flex-direction:column;gap:6px;min-height:36px;cursor:pointer;border-radius:var(--radius-sm)}
.dv-res-card{padding:8px 12px;border-radius:var(--radius-sm);border-left:4px solid var(--zone-beach);cursor:pointer;transition:var(--transition)}
.dv-res-card:hover{transform:translateX(4px)}
.dv-res-card.zone-beach{border-left-color:var(--zone-beach);background:rgba(0,180,216,.08)}
.dv-res-card.zone-indoor{border-left-color:var(--zone-indoor);background:rgba(231,111,81,.08)}
.dv-res-card.zone-salon{border-left-color:var(--zone-salon);background:rgba(155,93,229,.08)}
.dv-res-card .drc-name{font-weight:600;font-size:.85rem}
.dv-res-card .drc-meta{font-size:.7rem;color:var(--text-secondary);display:flex;gap:8px;margin-top:2px}

@media(max-width:767px){
  .week-view{display:none}
  .day-view{display:block}
  .sidebar{display:none}
}
@media(min-width:768px){
  .day-view{display:none}
  .week-view{display:block}
}

/* ===== SIDEBAR ===== */
.sidebar-section{margin-bottom:20px}
.sidebar-section h3{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:10px}
.upcoming-list{display:flex;flex-direction:column;gap:8px}
.upcoming-item{padding:10px 12px;border-radius:var(--radius-sm);background:var(--bg-glass);border:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.upcoming-item:hover{border-color:var(--primary);transform:translateX(4px)}
.upcoming-item .ui-name{font-weight:600;font-size:.85rem}
.upcoming-item .ui-meta{font-size:.7rem;color:var(--text-secondary);margin-top:2px}
.upcoming-item .ui-zone{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}

/* ===== FORM ===== */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.7rem;font-weight:600;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:10px 12px;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border);color:var(--text);font-size:.85rem;transition:var(--transition)}
.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--accent-glow)}
.stepper{display:flex;align-items:center;gap:12px}
.stepper button{width:36px;height:36px;border-radius:50%;background:var(--primary);color:#fff;font-size:1.2rem;display:flex;align-items:center;justify-content:center;font-weight:700}
.stepper span{font-size:1.2rem;font-weight:700;min-width:32px;text-align:center}
.zone-selector{display:flex;gap:8px}
.zone-option{flex:1;padding:10px 8px;border-radius:var(--radius-sm);background:var(--bg-card);border:2px solid var(--border);text-align:center;cursor:pointer;transition:var(--transition)}
.zone-option:hover{border-color:var(--primary)}
.zone-option.selected{border-color:var(--accent);background:var(--accent-glow)}
.zone-option .zo-icon{font-size:1.4rem;margin-bottom:4px}
.zone-option .zo-label{font-size:.65rem;font-weight:600;text-transform:uppercase}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.time-slot-btn{padding:8px;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border);color:var(--text);font-size:.75rem;font-weight:500;text-align:center;transition:var(--transition)}
.time-slot-btn:hover,.time-slot-btn.selected{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary{width:100%;padding:12px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;font-size:.9rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;box-shadow:0 4px 16px var(--accent-glow)}
.btn-primary:hover{box-shadow:0 6px 24px var(--accent-glow);transform:translateY(-2px)}

/* ===== FAB ===== */
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-size:1.5rem;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px var(--accent-glow);z-index:100;transition:var(--transition)}
.fab:hover{transform:scale(1.1) rotate(90deg)}
@media(min-width:1024px){.fab{display:none}}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
@media(min-width:768px){.modal-overlay.active{align-items:center}}
.modal{background:var(--bg);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:24px;animation:slideUp .4s cubic-bezier(.4,0,.2,1)}
@media(min-width:768px){.modal{border-radius:var(--radius-lg)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.2);margin:0 auto 16px}
.modal h2{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:16px}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:var(--bg-glass);color:var(--text);display:flex;align-items:center;justify-content:center;font-size:1rem}

/* ===== DETAIL MODAL ===== */
.detail-modal .dm-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.detail-modal .dm-zone{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.detail-modal .dm-name{font-family:'Playfair Display',serif;font-size:1.3rem}
.detail-modal .dm-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:.85rem}
.detail-modal .dm-row .dm-label{color:var(--text-muted)}
.detail-modal .dm-notes{margin-top:12px;padding:12px;border-radius:var(--radius-sm);background:var(--bg-card);font-size:.85rem;color:var(--text-secondary);font-style:italic}
</style>
</head>

function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function formatDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function getMonday(d){const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);return new Date(d.setDate(diff))}
function isSameDay(d1,d2){return formatDate(d1)===formatDate(d2)}

// ===== SWITCH RESTAURANT =====
function switchRestaurant(key){
  currentRestaurant=key;
  const r=restaurants[key];
  document.body.className=r.theme||'';
  document.getElementById('heroLogo').src=r.logo;
  document.getElementById('heroName').textContent=r.name;
  document.getElementById('heroTagline').textContent=r.tagline;
  document.getElementById('heroBg').style.backgroundImage="url('"+r.hero+"')";
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

// ===== NAVIGATION =====
function navWeek(dir){currentWeekStart=addDays(currentWeekStart,dir*7);render()}
function navDay(dir){currentDayView=addDays(currentDayView,dir);render()}
function setView(v,el){document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active')}

// ===== RENDER =====
function render(){
  renderStats();renderWeekView();renderDayView();renderUpcoming();renderForms();
}

function getFilteredRes(){return reservations.filter(r=>r.restaurant===currentRestaurant)}
function getTodayRes(){const t=formatDate(new Date());return getFilteredRes().filter(r=>r.date===t)}

function renderStats(){
  const today=getTodayRes();
  document.getElementById('statToday').textContent=today.length;
  document.getElementById('statGuests').textContent=today.reduce((s,r)=>s+r.people,0);
  document.getElementById('statBeach').textContent=today.filter(r=>r.zone==='beach').length;
  document.getElementById('statIndoor').textContent=today.filter(r=>r.zone==='indoor').length;
  document.getElementById('statSalon').textContent=today.filter(r=>r.zone==='salon').length;
}

function renderWeekView(){
  const ws=new Date(currentWeekStart);
  const days=[];for(let i=0;i<7;i++)days.push(addDays(new Date(ws),i));
  const today=new Date();
  document.getElementById('calendarTitle').textContent=days[0].getDate()+' '+monthNames[days[0].getMonth()]+' — '+days[6].getDate()+' '+monthNames[days[6].getMonth()]+', '+days[6].getFullYear();

  let html='<div class="week-header"><div class="time-label-header"></div>';
  days.forEach(d=>{
    const isToday=isSameDay(d,today);
    html+='<div class="day-label'+(isToday?' today':'')+'">'+dayNames[d.getDay()]+'<br><strong>'+d.getDate()+'</strong></div>';
  });
  html+='</div>';

  const filtered=getFilteredRes();
  hours.forEach(h=>{
    html+='<div class="time-slot"><div class="time-label">'+h+'</div>';
    days.forEach(d=>{
      const ds=formatDate(d);const isToday=isSameDay(d,today);
      const cellRes=filtered.filter(r=>r.date===ds&&r.time===h);
      html+='<div class="day-cell'+(isToday?' today-col':'')+'" onclick="openModalFor(\''+ds+'\',\''+h+'\')">';
      cellRes.forEach(r=>{
        html+='<div class="res-card '+zoneClasses[r.zone]+'" onclick="event.stopPropagation();showDetail('+r.id+')"><div class="rc-name">'+r.name+'</div><div class="rc-meta"><span>👥'+r.people+'</span></div></div>';
      });
      html+='</div>';
    });
    html+='</div>';
  });
  document.getElementById('weekView').innerHTML=html;
}

function renderDayView(){
  const d=currentDayView;const today=new Date();
  document.getElementById('dayViewTitle').textContent=dayNames[d.getDay()]+' '+d.getDate()+' '+monthNames[d.getMonth()];
  const ds=formatDate(d);const filtered=getFilteredRes().filter(r=>r.date===ds);
  let html='';
  hours.forEach(h=>{
    const cellRes=filtered.filter(r=>r.time===h);
    html+='<div class="dv-slot"><div class="dv-time">'+h+'</div><div class="dv-cards" onclick="openModalFor(\''+ds+'\',\''+h+'\')">';
    cellRes.forEach(r=>{
      html+='<div class="dv-res-card '+zoneClasses[r.zone]+'" onclick="event.stopPropagation();showDetail('+r.id+')"><div class="drc-name">'+r.name+'</div><div class="drc-meta"><span>👥 '+r.people+' personas</span><span>'+zoneIcons[r.zone]+' '+zoneNames[r.zone]+'</span></div></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('dayViewSlots').innerHTML=html;
}

function renderUpcoming(){
  const today=formatDate(new Date());
  const upcoming=getFilteredRes().filter(r=>r.date>=today).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).slice(0,8);
  let html='';
  upcoming.forEach(r=>{
    const d=new Date(r.date+'T00:00:00');
    html+='<div class="upcoming-item" onclick="showDetail('+r.id+')"><div class="ui-name"><span class="ui-zone" style="background:'+zoneColors[r.zone]+'"></span>'+r.name+'</div><div class="ui-meta">📅 '+dayNames[d.getDay()]+' '+d.getDate()+'/'+String(d.getMonth()+1).padStart(2,'0')+' • '+r.time+' • 👥 '+r.people+'</div></div>';
  });
  document.getElementById('upcomingList').innerHTML=html||'<p style="color:var(--text-muted);font-size:.8rem">Sin reservaciones próximas</p>';
}

function buildFormHTML(prefix,dateVal,timeVal){
  let html='<div class="form-group"><label>Nombre del invitado</label><input class="form-input" id="'+prefix+'Name" placeholder="Nombre completo"></div>';
  html+='<div class="form-group"><label>Teléfono</label><input class="form-input" id="'+prefix+'Phone" placeholder="744-XXX-XXXX"></div>';
  html+='<div class="form-group"><label>Personas</label><div class="stepper"><button onclick="stepPeople(\''+prefix+'\',-1)">−</button><span id="'+prefix+'People">2</span><button onclick="stepPeople(\''+prefix+'\',1)">+</button></div></div>';
  html+='<div class="form-group"><label>Zona</label><div class="zone-selector">';
  zones.forEach(z=>{html+='<div class="zone-option" data-zone="'+z+'" onclick="selectZone(\''+prefix+'\',\''+z+'\',this)"><div class="zo-icon">'+zoneIcons[z]+'</div><div class="zo-label">'+zoneNames[z]+'</div></div>'});
  html+='</div></div>';
  html+='<div class="form-group"><label>Fecha</label><input type="date" class="form-input" id="'+prefix+'Date" value="'+(dateVal||formatDate(new Date()))+'"></div>';
  html+='<div class="form-group"><label>Hora</label><div class="time-grid">';
  timeSlots.forEach(t=>{html+='<button class="time-slot-btn'+(t===timeVal?' selected':'')+'" onclick="selectTime(\''+prefix+'\',\''+t+'\',this)">'+t+'</button>'});
  html+='</div></div>';
  html+='<div class="form-group"><label>Notas</label><textarea class="form-input" id="'+prefix+'Notes" rows="2" placeholder="Notas especiales..."></textarea></div>';
  html+='<button class="btn-primary" onclick="saveReservation(\''+prefix+'\')">✓ Guardar Reservación</button>';
  return html;
}

function renderForms(){
  document.getElementById('sidebarForm').innerHTML=buildFormHTML('sb','','');
  document.getElementById('modalForm').innerHTML=buildFormHTML('md','','');
}

let formState={sb:{people:2,zone:'beach',time:''},md:{people:2,zone:'beach',time:''}};
function stepPeople(p,d){formState[p].people=Math.max(1,Math.min(100,(formState[p].people||2)+d));document.getElementById(p+'People').textContent=formState[p].people}
function selectZone(p,z,el){formState[p].zone=z;el.parentElement.querySelectorAll('.zone-option').forEach(o=>o.classList.remove('selected'));el.classList.add('selected')}
function selectTime(p,t,el){formState[p].time=t;el.parentElement.querySelectorAll('.time-slot-btn').forEach(o=>o.classList.remove('selected'));el.classList.add('selected')}

function saveReservation(p){
  const name=document.getElementById(p+'Name').value;
  const phone=document.getElementById(p+'Phone').value;
  const date=document.getElementById(p+'Date').value;
  const notes=document.getElementById(p+'Notes').value;
  if(!name){alert('Por favor ingresa el nombre');return}
  if(!date){alert('Por favor selecciona fecha');return}
  if(!formState[p].time){alert('Por favor selecciona hora');return}
  reservations.push({id:Date.now(),name,phone,people:formState[p].people,zone:formState[p].zone,date,time:formState[p].time,notes,restaurant:currentRestaurant});
  closeModal();render();formState[p]={people:2,zone:'beach',time:''};renderForms();
}

function openModal(){document.getElementById('newResModal').classList.add('active');formState.md={people:2,zone:'beach',time:''};renderForms()}
function openModalFor(date,time){document.getElementById('newResModal').classList.add('active');formState.md={people:2,zone:'beach',time:time};document.getElementById('modalForm').innerHTML=buildFormHTML('md',date,time)}
function closeModal(){document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('active'))}

function showDetail(id){
  const r=reservations.find(x=>x.id===id);if(!r)return;
  const d=new Date(r.date+'T00:00:00');
  let html='<div class="modal-handle"></div><button class="modal-close" onclick="closeModal()">✕</button>';
  html+='<div class="dm-header"><div class="dm-zone" style="background:'+zoneColors[r.zone]+'"></div><div class="dm-name">'+r.name+'</div></div>';
  html+='<div class="dm-row"><span class="dm-label">📅 Fecha</span><span>'+dayNames[d.getDay()]+' '+d.getDate()+' '+monthNames[d.getMonth()]+' '+d.getFullYear()+'</span></div>';
  html+='<div class="dm-row"><span class="dm-label">🕐 Hora</span><span>'+r.time+'</span></div>';
  html+='<div class="dm-row"><span class="dm-label">👥 Personas</span><span>'+r.people+'</span></div>';
  html+='<div class="dm-row"><span class="dm-label">📍 Zona</span><span>'+zoneIcons[r.zone]+' '+zoneNames[r.zone]+'</span></div>';
  html+='<div class="dm-row"><span class="dm-label">📞 Teléfono</span><span>'+(r.phone||'—')+'</span></div>';
  html+='<div class="dm-row"><span class="dm-label">🍽️ Restaurante</span><span>'+restaurants[r.restaurant].name+'</span></div>';
  if(r.notes)html+='<div class="dm-notes">📝 '+r.notes+'</div>';
  html+='<button class="btn-primary" style="margin-top:16px;background:#e74c3c" onclick="deleteRes('+r.id+')">🗑️ Eliminar</button>';
  document.getElementById('detailContent').innerHTML=html;
  document.getElementById('detailModal').classList.add('active');
}

function deleteRes(id){reservations=reservations.filter(r=>r.id!==id);closeModal();render()}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)closeModal()})});

// Init
render();
</script>
